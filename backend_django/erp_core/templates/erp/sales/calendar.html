{% extends "erp/base.html" %}
{% block title %}Calendar — SLURP ERP{% endblock %}
{% block content %}
<div class="page-header"><h1>Calendar</h1><a href="{% url 'sales_dashboard' %}" class="btn btn-secondary">Back</a></div>
<div class="card"><table class="data"><thead><tr><th>Date</th><th>Event</th><th>Type</th></tr></thead>
<tbody>{% for e in events %}<tr><td>{{ e.date }}</td><td>{{ e.title }}</td><td>{{ e.type }}</td></tr>{% empty %}<tr><td colspan="3">No events.</td></tr>{% endfor %}</tbody></table></div>
{% endblock %}
