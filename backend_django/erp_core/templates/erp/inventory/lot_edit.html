{% extends "erp/base.html" %}
{% block title %}Edit Lot — SLURP ERP{% endblock %}
{% block content %}
<div class="page-header"><h1>Edit Lot {{ lot.lot_number }}</h1><a href="{% url 'inventory_dashboard' %}" class="btn btn-secondary">Back</a></div>
<div class="card">
  <form method="post">
    {% csrf_token %}
    {% for field in form %}<div class="form-row"><label>{{ field.label }}</label>{{ field }}</div>{% endfor %}
    <button type="submit" class="btn btn-primary">Save</button>
  </form>
</div>
{% endblock %}
